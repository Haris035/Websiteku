<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamera HP</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:#fff;
}
video{
    width:90%;
    max-width:500px;
    border-radius:10px;
}
button{
    padding:10px 20px;
    margin:20px;
    font-size:16px;
}
</style>
</head>
<body>

<h2>Kamera HP</h2>

<video id="video" autoplay playsinline></video>
<br>
<button onclick="startCamera()">Aktifkan Kamera</button>

<script>
async function startCamera(){
    try{
        const stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        document.getElementById("video").srcObject = stream;
    }catch(err){
        alert("Izin kamera ditolak atau tidak tersedia.");
        console.log(err);
    }
}
</script>

</body>
</html>
